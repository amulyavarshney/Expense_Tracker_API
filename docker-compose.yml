services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENV=${ENV:-dev}
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-expense_tracker.settings}
      - SQLITE_DB_PATH=/data/db.sqlite3
      - DATABASE_URL=${DATABASE_URL:-}
    volumes:
      - sqlite_data:/data
    command: >
      sh -c "python manage.py migrate &&
             gunicorn expense_tracker.wsgi:application --bind 0.0.0.0:8000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: expense_tracker
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense_user -d expense_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

volumes:
  sqlite_data:
  postgres_data:
